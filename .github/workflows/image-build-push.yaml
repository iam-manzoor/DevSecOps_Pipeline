name: Image Build and Push

on:
  workflow_call:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # - name: checkout code
      #   uses: actions/checkout@v6

      - name: Image Build
        run: |
          docker build -t manzoor06:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          docker tag manzoor06:latest manzoor06/devsecops-pipeline:latest
          docker push manzoor06/devsecops-pipeline:latest
    